<section class="box-feedback-jop section">
  <div class="box-feedback-jop__container container">
    <div class="box-feedback-jop__content">
      <div class="box-feedback-jop__wrapper">
        <p>
          НАРТИС — это место, где ценят людей, идеи и результаты.
        </p>
        <span>
          Будем рады видеть вас в нашей команде!
        </span>
      </div>
      <button class="box-feedback-jop__btn btn-reset" href="#">
        Отправить резюме
      </button>

      <div class="box-feedback__popup-modal popup-modal">
        <div class="popup-modal__window">
          <div class="box-feedback__modal-scroll">
            <div>
              <div class="box-feedback-jop__window-info">
                <h3 class="box-feedback-jop__window-title">
                  Выберите удобный способ отправки резюме
                </h3>
                <div class="box-feedback-jop__group-links">
                  <a class="box-feedback-jop__window-link" href="#">
                    <img src="img/box-feedback-jop/hh.svg" alt="img">
                    <span class="text">Отправить через hh.ru</span>
                  </a>
                  <a class="box-feedback-jop__window-link" href="#">
                    <img src="img/box-feedback-jop/avito.svg" alt="img">
                    <span class="text">Отправить через Avito</span>
                  </a>
                  <a class="box-feedback-jop__window-link" href="mailto:">
                    <img src="img/box-feedback-jop/mail.svg" alt="img">
                    <span class="text">Написать нам на e-mail</span>
                  </a>
                </div>
              </div>
              <button class="btn-download__close btn-reset close">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <use xlink:href="img/sprite.svg#closeDownload"></use>
                </svg>
                <span class="text">Закрыть</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
